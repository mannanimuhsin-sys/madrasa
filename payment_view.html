<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Official Receipt</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #555; display: flex; justify-content: center; padding: 20px; }
        .receipt-box { width: 380px; background: white; padding: 25px; border-radius: 10px; border-top: 10px solid #004d00; position: relative; }
        .m-name { text-align: center; color: #004d00; margin: 0; font-size: 22px; }
        .m-place { text-align: center; margin: 5px 0; font-size: 12px; color: #666; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px; }
        .amount-big { text-align: center; background: #f4f4f4; padding: 15px; font-size: 24px; font-weight: bold; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; }
        .footer-note { text-align: center; font-size: 11px; color: #888; margin-top: 20px; }
        .paid-stamp { position: absolute; right: 20px; bottom: 80px; border: 3px solid #2e7d32; color: #2e7d32; padding: 5px 10px; border-radius: 5px; transform: rotate(-15deg); font-weight: bold; opacity: 0.8; }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="receipt-box" id="printArea">
    <h2 class="m-name" id="mName">മദ്റസ പേര്</h2>
    <p class="m-place" id="mPlace">സ്ഥലം | രജിസ്റ്റർ നമ്പർ</p>
    
    <div style="text-align: center; font-weight: bold; margin: 10px 0; text-decoration: underline;">FEES RECEIPT</div>

    <div class="row"><span>Receipt No:</span> <b id="rId">--</b></div>
    <div class="row"><span>Date:</span> <b id="rDate">--</b></div>
    <hr>
    <div class="row"><span>Student Name:</span> <b id="sName">--</b></div>
    <div class="row"><span>Reg Number:</span> <b id="sReg">--</b></div>
    <div class="row"><span>Purpose:</span> <b id="rCat">--</b></div>
    
    <div class="amount-big">₹ <span id="rAmt">0.00</span></div>

    <div class="paid-stamp">PAID ✅</div>

    <div class="footer-note">This is a computer generated receipt. <br> Powered by എന്‍റെ മദ്റസ Smart Portal</div>
    
    <button class="no-print" onclick="window.print()" style="width:100%; padding:10px; margin-top:20px; cursor:pointer;">Download / Print</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    const mID = new URLSearchParams(window.location.search).get('id');
    const data = JSON.parse(localStorage.getItem("currentReceipt"));

    if(data) {
        document.getElementById('rId').innerText = data.receiptId || "N/A";
        document.getElementById('rDate').innerText = data.date;
        document.getElementById('sName').innerText = data.sName;
        document.getElementById('sReg').innerText = data.reg;
        document.getElementById('rCat').innerText = data.category;
        document.getElementById('rAmt').innerText = data.amount;

        // മദ്റസ പേര് ലോഡ് ചെയ്യുന്നു
        rtdb.ref('madrasa_requests/' + mID).once('value', snap => {
            const m = snap.val();
            if(m) {
                document.getElementById('mName').innerText = m.name;
                document.getElementById('mPlace').innerText = m.place + " | Reg: " + m.reg;
            }
        });
    }
</script>
</body>
</html>
