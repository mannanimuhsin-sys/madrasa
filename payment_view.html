<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>പെയ്‌മെന്റ് ഹിസ്റ്ററി | എന്‍റെ മദ്റസ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #004d00; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .student-card { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .student-card h3 { margin: 0; color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        th { background: #f9f9f9; color: #666; }
        
        .status-paid { color: #2e7d32; font-weight: bold; font-size: 11px; background: #c8e6c9; padding: 3px 6px; border-radius: 4px; }
        .btn-print { border: none; background: var(--primary); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .back-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button class="back-btn" onclick="window.history.back()">
        <i class="fa fa-arrow-left"></i> BACK
    </button>

    <div class="header">
        <h2 style="color: var(--primary); margin: 0;">പെയ്‌മെന്റ് റിപ്പോർട്ട്</h2>
    </div>

    <div class="student-card" id="studentDisplay">
        <h3 id="dispName">വിദ്യാർത്ഥി പേര്</h3>
        <p id="dispReg" style="margin: 5px 0 0 0; opacity: 0.8;">Reg No: --</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>വിവരണം</th>
                <th>തുക</th>
                <th>Status</th>
                <th>Receipt</th>
            </tr>
        </thead>
        <tbody id="paymentTable">
            </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('id');
    
    // ലോഗിൻ ചെയ്ത കുട്ടിയുടെ വിവരം LocalStorage-ൽ നിന്ന് എടുക്കുന്നു
    const savedReg = localStorage.getItem("loggedStudentReg");
    const savedName = localStorage.getItem("loggedStudentName");

    if (savedReg) {
        document.getElementById('dispName').innerText = savedName;
        document.getElementById('dispReg').innerText = "Reg No: " + savedReg;

        // ആ കുട്ടിയുടെ പെയ്‌മെന്റ് മാത്രം ഫിൽട്ടർ ചെയ്യുന്നു
        db.ref('payments/' + mID).orderByChild('reg').equalTo(savedReg).on('value', snap => {
            const list = document.getElementById('paymentTable');
            list.innerHTML = "";
            
            if (snap.exists()) {
                snap.forEach(child => {
                    const p = child.val();
                    const row = `<tr>
                        <td><b>${p.category}</b><br><small>${p.remark || ''}</small></td>
                        <td>₹${p.amount}</td>
                        <td><span class="status-paid">PAID</span></td>
                        <td>
                            <button class="btn-print" onclick='printReceipt(${JSON.stringify(p)})'>
                                <i class="fa fa-print"></i>
                            </button>
                        </td>
                    </tr>`;
                    list.innerHTML += row;
                });
            } else {
                list.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'>പെയ്‌മെന്റ് വിവരങ്ങൾ ഒന്നും ലഭ്യമല്ല.</td></tr>";
            }
        });
    }

    // റസീറ്റ് പ്രിന്റ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
    function printReceipt(p) {
        const printContent = `
            <html>
            <head><title>Receipt</title></head>
            <body style="font-family: sans-serif; display: flex; justify-content: center; padding: 20px;">
                <div style="border: 2px solid #004d00; padding: 20px; width: 350px; border-radius: 10px;">
                    <h2 style="text-align: center; color: #004d00; margin-bottom: 5px;">മദ്റസ പെയ്‌മെന്റ് റസീറ്റ്</h2>
                    <p style="text-align: center; font-size: 12px; margin-top: 0;">Smart Management Portal</p>
                    <hr>
                    <p><b>വിദ്യാർത്ഥി:</b> ${savedName}</p>
                    <p><b>Reg No:</b> ${p.reg}</p>
                    <p><b>ആവശ്യം:</b> ${p.category}</p>
                    <p><b>വിവരണം:</b> ${p.remark || '-'}</p>
                    <p><b>തിയ്യതി:</b> ${p.date}</p>
                    <h3 style="text-align: center; background: #f4f4f4; padding: 10px;">തുക: ₹${p.amount}</h3>
                    <hr>
                    <p style="text-align: center; color: green; font-weight: bold;">STATUS: PAID ✅</p>
                    <p style="text-align: center; font-size: 10px; color: #666;">ഈ റസീറ്റ് കമ്പ്യൂട്ടർ ജനറേറ്റ് ചെയ്തതാണ്.</p>
                </div>
                <script>window.print();<\/script>
            </body>
            </html>
        `;
        const win = window.open('', '_blank');
        win.document.write(printContent);
        win.document.close();
    }
</script>

</body>
</html>
