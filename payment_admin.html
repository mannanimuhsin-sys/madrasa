<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #004d00; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .admin-box { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .student-list-container { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-top: 15px; }
        .student-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; gap: 10px; }
        .student-item:hover { background: #f0f7f0; }
        .btn-pay { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .status-badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .paid { background: #e8f5e9; color: #2e7d32; }
        .pending { background: #fff3e0; color: #ef6c00; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="color:var(--primary); text-align:center;">പെയ്‌മെന്റ് കൺട്രോൾ പാനൽ</h2>
    
    <div class="filter-grid">
        <div>
            <label>വിഭാഗം</label>
            <select id="genderFilter" onchange="loadStudents()">
                <option value="All">All Students</option>
                <option value="Male">Boys</option>
                <option value="Female">Girls</option>
            </select>
        </div>
        <div>
            <label>ക്ലാസ്സ്</label>
            <select id="classFilter" onchange="loadStudents()">
                <option value="All">All Classes</option>
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Class ${i}</option>`)</script>
            </select>
        </div>
        <div>
            <label>തീയതി</label>
            <input type="date" id="payDate">
        </div>
    </div>

    <input type="text" id="payReason" placeholder="എന്തിനുള്ള പെയ്‌മെന്റ്? (ഉദാ: May Month Fee)" style="margin-bottom: 10px;">
    <input type="number" id="payAmount" placeholder="തുക (Amount)">

    <div style="margin-top:20px; font-weight:bold;">വിദ്യാർത്ഥികളെ തിരഞ്ഞെടുക്കുക: 
        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> Select All
    </div>

    <div class="student-list-container" id="studentList">
        </div>

    <button class="btn-pay" onclick="bulkPayment()">SAVE PAYMENT DATA</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCe98Gw-si7idO0m8y5xbLLG8Z2HC3RCKE",
        authDomain: "mum-new-id.firebaseapp.com",
        projectId: "mum-new-id",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();
    const rtdb = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mID = urlParams.get('id');
    document.getElementById('payDate').valueAsDate = new Date();

    async function loadStudents() {
        const gender = document.getElementById('genderFilter').value;
        const cls = document.getElementById('classFilter').value;
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = "Loading...";

        let query = fs.collection("students").where("madrasa_id", "==", mID).where("status", "==", "approved");

        const snap = await query.get();
        listDiv.innerHTML = "";
        
        snap.forEach(doc => {
            const s = doc.data();
            // Filter Logic
            if(gender !== 'All' && s.gender !== gender) return;
            if(cls !== 'All' && s.class != cls) return;

            listDiv.innerHTML += `
                <div class="student-item">
                    <input type="checkbox" class="stu-checkbox" value="${s.number}" data-name="${s.name}">
                    <div style="flex:1">
                        <b>${s.name}</b> <br>
                        <small>Reg: ${s.number} | Class: ${s.class} | ${s.gender}</small>
                    </div>
                </div>`;
        });
    }

    function toggleSelectAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.stu-checkbox').forEach(cb => cb.checked = checked);
    }

    async function bulkPayment() {
        const reason = document.getElementById('payReason').value;
        const amount = document.getElementById('payAmount').value;
        const date = document.getElementById('payDate').value;
        const selected = document.querySelectorAll('.stu-checkbox:checked');

        if(!reason || !amount || selected.length === 0) return alert("വിവരങ്ങൾ പൂർണ്ണമല്ല!");

        if(confirm(`${selected.length} വിദ്യാർത്ഥികൾക്ക് പെയ്‌മെന്റ് ചേർക്കണോ?`)) {
            for(let cb of selected) {
                const reg = cb.value;
                const name = cb.getAttribute('data-name');
                const receiptId = "RCP" + Date.now() + Math.floor(Math.random() * 1000);

                await rtdb.ref('payments/' + mID + '/' + reg).push({
                    receiptId, reg, sName: name, category: reason, 
                    amount, date, status: 'paid', timestamp: Date.now()
                });
            }
            alert("വിജയകരമായി പൂർത്തിയാക്കി!");
            location.reload();
        }
    }

    loadStudents();
</script>
</body>
</html>
