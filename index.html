<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>എന്‍റെ മദ്റസ | Smart Management</title>
    
    <meta name="google-site-verification" content="HUwfSaKZjE0L1uUTrx7RSZDbEWY2C8c__vYxCW-YJyM" />
    <meta name="keywords" content="Entte madrasa, എന്‍റെ മദ്റസ, Madrasa Management, Mannani Muhsin, Kerala Madrasa Portal">
    <meta name="description" content="Entte Madrasa (എന്‍റെ മദ്റസ) - A smart management system for madrasa activities.">
    <link rel="manifest" href="manifest.json">
    <script> if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js') } </script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #004d00; --gold: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; margin: auto; position: relative; padding: 15px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* പ്ലസ് ബട്ടൺ സ്റ്റൈൽ */
        .secret-trigger { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; color: #ddd; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        
        .page { display: none; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Profile Card Design */
        .profile-card { text-align: center; background: linear-gradient(135deg, #004d00, #002b00); color: white; padding: 30px 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,77,0,0.2); }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; background: white; margin-bottom: 15px; }
        .m-name { font-size: 22px; font-weight: 800; margin: 0; text-transform: uppercase; color: white; }
        .m-reg { display: inline-block; background: var(--gold); color: black; padding: 4px 15px; border-radius: 50px; font-weight: bold; font-size: 13px; margin-top: 10px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dash { background: white; color: var(--primary); border: 2.5px solid var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; margin-top: 15px; }

        /* Title Area */
        .m-title-area { text-align: center; margin-bottom: 25px; margin-top: 30px; }
        .m-logo-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        .m-title { font-size: 28px; font-weight: 800; color: var(--primary); margin: 0; }
        
        #imagePrev { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div class="container">

        <div id="loginPage" class="page active">
            <div class="secret-trigger" onclick="showPage('regPage')"><i class="fa fa-plus"></i></div>
            <div class="m-title-area">
                <img src="logo.png" alt="Logo" class="m-logo-img">
                <h1 class="m-title">എന്‍റെ മദ്റസ</h1>
                <p style="color: #666; font-size: 14px;">Smart Management Portal</p>
            </div>
            <div style="margin-top: 20px;">
                <input type="text" id="logReg" placeholder="മദ്റസ രജിസ്റ്റർ നമ്പർ">
                <input type="password" id="logPass" placeholder="പാസ്‌വേഡ്">
                <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">LOGIN</button>
            </div>
        </div>

        <div id="regPage" class="page">
            <h2 style="text-align: center; color: var(--primary);">പുതിയ രജിസ്‌ട്രേഷൻ</h2>
            <div style="text-align: center; margin-bottom: 15px;">
                <img id="imagePrev" src="">
                <label for="mPhoto" style="cursor: pointer; color: var(--primary); font-weight: bold; display: block; margin-top: 10px;">
                    <i class="fa fa-camera"></i> മദ്റസ ഫോട്ടോ ചേർക്കുക
                </label>
                <input type="file" id="mPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </div>
            <input type="text" id="rName" placeholder="മദ്റസയുടെ പേര്">
            <input type="text" id="rPlace" placeholder="സ്ഥലം">
            <input type="text" id="rReg" placeholder="രജിസ്റ്റർ നമ്പർ">
            <input type="text" id="rUser" placeholder="User ID">
            <input type="password" id="rUsthad" placeholder="ഉസ്താദ് പാസ്‌വേഡ്">
            <input type="password" id="rParent" placeholder="പാരന്റ് പാസ്‌വേഡ്">
            <button class="btn btn-primary" id="regBtn" onclick="register()">REGISTER NOW</button>
            <button class="btn" style="background: #ccc;" onclick="showPage('loginPage')">BACK</button>
        </div>

        <div id="portalPage" class="page">
            <div id="profileArea"></div>
            
            <button class="btn btn-dash" id="btnDash" onclick="openDashboard()">
                <i class="fa fa-chart-line"></i> DASHBOARD
            </button>
            <button class="btn btn-dash" id="btnID" onclick="openIDPortal()">
                <i class="fa fa-id-badge"></i> ID CARD PORTAL
            </button>
            <button class="btn btn-dash" id="btnQuiz" onclick="openQuizPortal()" style="border-color: #ff9800; color: #ff9800;">
                <i class="fa fa-question-circle"></i> SPECIAL DAY QUIZ
            </button>

            <div id="adminSettingsSection" style="display: none; margin-top: 15px;">
                <button class="btn btn-dash" onclick="window.location.href='settings.html?id='+currentId" style="background: #607d8b; color: white; border: none;">
                    <i class="fa fa-cog"></i> SETTINGS (Control Panel)
                </button>
            </div>

            <button class="btn" style="background: #f8d7da; color: #721c24; margin-top: 40px;" onclick="logout()">
                <i class="fa fa-sign-out-alt"></i> LOGOUT
            </button>
        </div>

        <div id="pendingPage" class="page">
            <div style="text-align: center; padding: 50px 20px;">
                <i class="fa fa-clock" style="font-size: 60px; color: orange;"></i>
                <h3>അപ്രൂവൽ കാത്തിരിക്കുന്നു</h3>
                <p>നിങ്ങളുടെ രജിസ്‌ട്രേഷൻ അഡ്മിൻ പരിശോധിച്ചു കൊണ്ടിരിക്കുകയാണ്.</p>
                <button class="btn btn-primary" onclick="location.reload()">BACK</button>
            </div>
        </div>

    </div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBAPJUq6ubYpALsqaT0DJi9KnLabtuaMyI",
        authDomain: "enttemadrasa.firebaseapp.com",
        databaseURL: "https://enttemadrasa-default-rtdb.firebaseio.com",
        projectId: "enttemadrasa",
        storageBucket: "enttemadrasa.firebasestorage.app",
        appId: "1:623531881201:web:b863793340c3901cedaf50"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentId = "";
    let currentRole = "";

    // പേജ് മാറ്റാൻ
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ഫോട്ടോ പ്രിവ്യൂ
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const prev = document.getElementById('imagePrev');
                prev.src = e.target.result; prev.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ലോഗിൻ ഫങ്ക്ഷൻ
    async function handleLogin() {
        const reg = document.getElementById('logReg').value.trim();
        const pass = document.getElementById('logPass').value.trim();
        const btn = document.getElementById('loginBtn');

        if(!reg || !pass) return alert("വിവരങ്ങൾ നൽകുക");
        btn.disabled = true;

        db.ref('madrasa_requests').once('value', snap => {
            let foundUser = null;
            let userId = "";

            snap.forEach(c => {
                const d = c.val();
                if(d.reg === reg) {
                    if(d.usthadPass === pass) { foundUser = d; userId = c.key; currentRole = "admin"; }
                    else if(d.parentPass === pass) { foundUser = d; userId = c.key; currentRole = "parent"; }
                }
            });

            if(foundUser) {
                if(foundUser.status !== 'approved') { showPage('pendingPage'); } 
                else {
                    currentId = userId;
                    localStorage.setItem("madrasaId", userId);
                    localStorage.setItem("userRole", currentRole);
                    loadProfile(foundUser);
                }
            } else { alert("രജിസ്റ്റർ നമ്പറോ പാസ്‌വേഡോ തെറ്റാണ്!"); }
            btn.disabled = false;
        });
    }

    // പ്രൊഫൈൽ ലോഡിംഗും സെറ്റിംഗ്സ് കൺട്രോളും
    function loadProfile(d) {
        const img = d.photo || "https://via.placeholder.com/150";
        document.getElementById('profileArea').innerHTML = `
            <div class="profile-card">
                <img src="${img}" class="profile-img">
                <h1 class="m-name">${d.name}</h1>
                <p style="margin:5px 0; opacity:0.8;">${d.place}</p>
                <div class="m-reg">REG NO: ${d.reg}</div>
            </div>`;
        
        // സെറ്റിംഗ്സ് അനുസരിച്ച് ഷോ/ഹൈഡ് ബട്ടണുകൾ
        db.ref('settings/' + currentId).on('value', snap => {
            const s = snap.val() || { dash: true, id: true, quiz: true };
            
            // രക്ഷിതാക്കൾക്ക് കാണുന്ന രീതി
            document.getElementById('btnDash').style.display = s.dash ? 'flex' : 'none';
            document.getElementById('btnID').style.display = s.id ? 'flex' : 'none';
            document.getElementById('btnQuiz').style.display = s.quiz ? 'flex' : 'none';

            // ഉസ്താദ് (admin) ആണെങ്കിൽ സെറ്റിംഗ്സ് ബട്ടൺ കാണിക്കുക, ബാക്കി എല്ലാം ഓപ്പൺ ആക്കുക
            if(currentRole === 'admin') {
                document.getElementById('adminSettingsSection').style.display = 'block';
                document.getElementById('btnDash').style.display = 'flex';
                document.getElementById('btnID').style.display = 'flex';
                document.getElementById('btnQuiz').style.display = 'flex';
            }
        });
        showPage('portalPage');
    }

    // ബട്ടൺ ഫങ്ക്ഷനുകൾ (പഴയ കോഡിൽ നിന്ന്)
    function openDashboard() {
        const baseUrl = "https://mannanimuhsin-sys.github.io/madrasa/dashbord";
        window.location.href = `${baseUrl}?id=${currentId}&role=${currentRole}`;
    }

    function openIDPortal() {
        if (currentRole === "admin") {
            window.location.href = `https://mannanimuhsin-sys.github.io/madrasa/admin_id_portal.html?id=${currentId}`;
        } else {
            window.location.href = `https://mannanimuhsin-sys.github.io/madrasa/student_id.html?mid=${currentId}`;
        }
    }

    function openQuizPortal() {
        if (currentRole === "admin") {
            window.location.href = `admin_quiz.html?id=${currentId}`;
        } else {
            window.location.href = `student_quiz.html?mid=${currentId}`;
        }
    }

    // ഓട്ടോ ലോഗിൻ
    window.onload = function() {
        const savedId = localStorage.getItem("madrasaId");
        const savedRole = localStorage.getItem("userRole");
        if (savedId && savedRole) {
            currentId = savedId;
            currentRole = savedRole;
            db.ref('madrasa_requests/' + savedId).once('value', snap => {
                if(snap.val() && snap.val().status === 'approved') {
                    loadProfile(snap.val());
                }
            });
        }
    };

    function logout() {
        if(confirm("Logout ചെയ്യണോ?")) {
            localStorage.clear();
            location.reload();
        }
    }

    
    // രജിസ്‌ട്രേഷൻ ലോജിക് (പഴയ കോഡിൽ നിന്ന്)
    async function register() {
        const regNo = document.getElementById('rReg').value.trim();
        const uId = document.getElementById('rUser').value.trim();
        const photo = document.getElementById('imagePrev').src;
        if(!regNo || !uId) return alert("വിവരങ്ങൾ നൽകുക");

        const data = {
            name: document.getElementById('rName').value,
            place: document.getElementById('rPlace').value,
            reg: regNo,
            photo: photo || "",
            usthadPass: document.getElementById('rUsthad').value,
            parentPass: document.getElementById('rParent').value,
            status: "pending"
        };

        db.ref('madrasa_requests/' + uId).set(data).then(() => {
            alert("രജിസ്ട്രേഷൻ വിജയിച്ചു! അപ്രൂവലിനായി കാത്തിരിക്കുക.");
            location.reload();
        });
    }
</script>

</body>
</html>
